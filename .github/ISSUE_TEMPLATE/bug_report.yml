name: Bug report
description: Report a problem with the uw-api Python library.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: input
    id: version
    attributes:
      label: Library version
      description: Which version of uw-api are you using?
      placeholder: e.g. 0.2.0
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Which Python version are you running?
      placeholder: e.g. 3.13
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: A code snippet that reproduces the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Traceback or error output
      description: |
        Paste the full traceback. **Redact your credentials before posting.**
      render: text
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help.
    validations:
      required: false
